project_id = "realtyodyssey-frontend"

[api]
schemas = ["public", "graphql_public", "app"]
extra_search_path = ["public", "extensions", "app"]

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/auth-callback",
  "http://127.0.0.1:3000/auth-callback",
  "http://localhost:3000/auth-callback?redirect_to=/reset-password",
  "http://127.0.0.1:3000/auth-callback?redirect_to=/reset-password"
]

[auth.email]
enable_signup = true
enable_confirmations = true
double_confirm_changes = true

[auth.email.template.confirmation]
subject = "Your RealtyOdyssey verification code"
content_path = "./supabase/templates/confirmation.html"

[auth.mfa]
max_enrolled_factors = 10

[auth.mfa.totp]
enroll_enabled = true
verify_enabled = true

[functions.mpesa-create-setup]
verify_jwt = false

[functions.payment-create-setup]
verify_jwt = false

[functions.mpesa-register-c2b]
verify_jwt = false

[functions.mpesa-stk-push]
verify_jwt = false

[functions.initiate-payment]
verify_jwt = false

[functions.mpesa-callback]
verify_jwt = false

[functions.mpesa-payment-status]
verify_jwt = false

[functions.mpesa-get-payment-setup]
verify_jwt = false

[functions.daraja-c2b-validation]
verify_jwt = false

[functions.daraja-c2b-confirmation]
verify_jwt = false
