name: Supabase Functions

on:
  push:
    branches:
      - "**"
    paths:
      - "functions/**"
      - "config.toml"
      - "deno.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/supabase-functions.yml"
  pull_request:
    paths:
      - "functions/**"
      - "config.toml"
      - "deno.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/supabase-functions.yml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: Deploy all edge functions instead of diffing changes
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-functions:
    name: Validate Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository into Supabase folder
        uses: actions/checkout@v4
        with:
          path: supabase

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: supabase/pnpm-lock.yaml

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install backend dependencies
        working-directory: supabase
        run: pnpm install --frozen-lockfile

      - name: Type-check Node utilities
        working-directory: supabase
        run: pnpm run typecheck

      - name: Check Edge Function formatting
        working-directory: supabase
        run: pnpm run functions:fmt:check

      - name: Lint Edge Functions
        working-directory: supabase
        run: pnpm run functions:lint

      - name: Type-check Edge Functions
        working-directory: supabase
        run: pnpm run functions:check

  deploy-production-functions:
    name: Deploy Changed Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-functions
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        shell: bash
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PRODUCTION }}
      DEPLOY_ALL_INPUT: ${{ inputs.deploy_all }}
    steps:
      - name: Checkout repository into Supabase folder
        uses: actions/checkout@v4
        with:
          path: supabase
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Verify production secrets are configured
        run: |
          missing=0
          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production secret: $secret_name"
              missing=1
            fi
          done
          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Resolve changed functions
        id: changed-functions
        run: |
          set -euo pipefail
          # We are at the runner root. The repo is in ./supabase
          cd supabase

          deploy_all=0
          if [[ "${DEPLOY_ALL_INPUT:-false}" == "true" ]]; then
            deploy_all=1
          fi

          before_sha="${{ github.event.before }}"
          if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            deploy_all=1
          fi

          if [[ "$deploy_all" -eq 1 ]]; then
            find functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' | sort > ../functions_to_deploy.txt
          else
            declare -A selected_functions=()
            while IFS= read -r file; do
              [[ -z "$file" ]] && continue
              if [[ "$file" =~ ^functions/([^/]+)/ ]]; then
                function_name="${BASH_REMATCH[1]}"
                [[ "$function_name" != "_shared" ]] && selected_functions["$function_name"]=1
              elif [[ "$file" =~ ^(config.toml|deno.json|_shared/) ]]; then
                # Re-deploy all if shared config/helpers change
                find functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' | sort > ../functions_to_deploy.txt
                echo "count=$(wc -l < ../functions_to_deploy.txt)" >> "$GITHUB_OUTPUT"
                exit 0
              fi
            done <<< "$(git diff --name-only "$before_sha" "${{ github.sha }}")"

            : > ../functions_to_deploy.txt
            for name in "${!selected_functions[@]}"; do echo "$name" >> ../functions_to_deploy.txt; done
          fi

          echo "count=$(grep -cve '^\s*$' ../functions_to_deploy.txt || true)" >> "$GITHUB_OUTPUT"

      - name: Prune deleted functions
        run: |
          echo "Fetching remote functions..."
          # Supabase CLI with --workdir . looks for ./supabase
          remote_functions=$(supabase functions list --workdir . --project-ref "$SUPABASE_PROJECT_REF" --output json | jq -r '.[].name')

          for remote_name in $remote_functions; do
            if [ ! -d "supabase/functions/$remote_name" ]; then
              echo "Pruning obsolete function: $remote_name"
              supabase functions delete "$remote_name" --workdir . --project-ref "$SUPABASE_PROJECT_REF" --non-interactive
            fi
          done

      - name: Deploy changed functions
        if: steps.changed-functions.outputs.count != '0'
        run: |
          while IFS= read -r function_name; do
            [[ -z "$function_name" ]] && continue

            args=(functions deploy "$function_name" --workdir . --project-ref "$SUPABASE_PROJECT_REF")
            
            case "$function_name" in
              mpesa-create-setup|mpesa-register-c2b|mpesa-c2b-validation|mpesa-c2b-confirmation|daraja-c2b-validation|daraja-c2b-confirmation)
                args+=(--no-verify-jwt)
                ;;
            esac

            echo "🚀 Deploying: $function_name"
            supabase "${args[@]}"
          done < functions_to_deploy.txt

      - name: Report skipped deployment
        if: steps.changed-functions.outputs.count == '0'
        run: echo "No edge function deployment required for this push."
