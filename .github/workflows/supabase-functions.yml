name: Supabase Functions

on:
  push:
    branches:
      - "**"
    paths:
      - "functions/**"
      - "config.toml"
      - "deno.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/supabase-functions.yml"
  pull_request:
    paths:
      - "functions/**"
      - "config.toml"
      - "deno.json"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
      - ".github/workflows/supabase-functions.yml"
  workflow_dispatch:
    inputs:
      deploy_all:
        description: Deploy all edge functions instead of diffing changes
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: supabase-functions-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-functions:
    name: Validate Edge Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Type-check Node utilities
        run: pnpm run typecheck

      - name: Check Edge Function formatting
        run: pnpm run functions:fmt:check

      - name: Lint Edge Functions
        run: pnpm run functions:lint

      - name: Type-check Edge Functions
        run: pnpm run functions:check

  deploy-production-functions:
    name: Deploy Changed Functions
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-functions
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        shell: bash
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PRODUCTION }}
      DEPLOY_ALL_INPUT: ${{ inputs.deploy_all }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Verify production secrets are configured
        run: |
          missing=0

          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_PROJECT_REF; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production secret: $secret_name"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Resolve changed functions
        id: changed-functions
        run: |
          set -euo pipefail

          deploy_all=0
          if [[ "${DEPLOY_ALL_INPUT:-false}" == "true" ]]; then
            deploy_all=1
          fi

          before_sha="${{ github.event.before }}"
          current_sha="${{ github.sha }}"

          if [[ -z "$before_sha" || "$before_sha" == "0000000000000000000000000000000000000000" ]]; then
            deploy_all=1
          fi

          if [[ "$deploy_all" -eq 0 ]]; then
            changed_files="$(git diff --name-only "$before_sha" "$current_sha")"

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              case "$file" in
                config.toml|deno.json|package.json|pnpm-lock.yaml|tsconfig.json)
                  deploy_all=1
                  break
                  ;;
                functions/_shared/*)
                  deploy_all=1
                  break
                  ;;
              esac
            done <<< "$changed_files"
          fi

          if [[ "$deploy_all" -eq 1 ]]; then
            find functions -mindepth 1 -maxdepth 1 -type d ! -name '_shared' -printf '%f\n' | sort > functions_to_deploy.txt
          else
            declare -A selected_functions=()

            while IFS= read -r file; do
              [[ -z "$file" ]] && continue

              if [[ "$file" =~ ^functions/([^/]+)/ ]]; then
                function_name="${BASH_REMATCH[1]}"
                if [[ "$function_name" != "_shared" ]]; then
                  selected_functions["$function_name"]=1
                fi
              fi
            done <<< "$(git diff --name-only "$before_sha" "$current_sha")"

            : > functions_to_deploy.txt
            for function_name in "${!selected_functions[@]}"; do
              echo "$function_name" >> functions_to_deploy.txt
            done
            sort -o functions_to_deploy.txt functions_to_deploy.txt
          fi

          function_count="$(grep -cve '^\s*$' functions_to_deploy.txt || true)"
          echo "count=$function_count" >> "$GITHUB_OUTPUT"

          echo "Functions selected for deployment:"
          if [[ "$function_count" -eq 0 ]]; then
            echo "(none)"
          else
            cat functions_to_deploy.txt
          fi

      - name: Deploy changed functions
        if: steps.changed-functions.outputs.count != '0'
        run: |
          while IFS= read -r function_name; do
            if [[ -z "$function_name" ]]; then
              continue
            fi

            args=(functions deploy "$function_name" --project-ref "$SUPABASE_PROJECT_REF")
            case "$function_name" in
              mpesa-create-setup|mpesa-register-c2b|mpesa-c2b-validation|mpesa-c2b-confirmation)
                args+=(--no-verify-jwt)
                ;;
            esac

            echo "Deploying function: $function_name"
            supabase "${args[@]}"
          done < functions_to_deploy.txt

      - name: Report skipped deployment
        if: steps.changed-functions.outputs.count == '0'
        run: echo "No edge function deployment required for this push."
