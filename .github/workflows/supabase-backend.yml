name: Supabase Backend

on:
  push:
    branches:
      - "**"
    paths-ignore:
      - "functions/**"
      - "deno.json"
      - "config.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  pull_request:
    paths-ignore:
      - "functions/**"
      - "deno.json"
      - "config.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - "tsconfig.json"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: supabase-backend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Local Stack
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        shell: bash
    steps:
      - name: Checkout repository into Supabase folder
        uses: actions/checkout@v4
        with:
          path: supabase

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: supabase/pnpm-lock.yaml

      - name: Set up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Install backend dependencies
        working-directory: supabase
        run: pnpm install --frozen-lockfile

      - name: Type-check Node utilities
        working-directory: supabase
        run: pnpm run typecheck

      - name: Check Edge Function formatting
        working-directory: supabase
        run: pnpm run functions:fmt:check

      - name: Lint Edge Functions
        working-directory: supabase
        run: pnpm run functions:lint

      - name: Type-check Edge Functions
        working-directory: supabase
        run: pnpm run functions:check

      - name: Start local Supabase stack
        run: supabase start --workdir .

      - name: Reset local database from migrations
        run: supabase db reset --workdir . --local

      - name: Show local Supabase status
        run: supabase status --workdir .

      - name: Stop local Supabase stack
        if: always()
        run: |
          if command -v supabase >/dev/null 2>&1; then
            supabase stop --workdir .
          fi

  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment: production
    defaults:
      run:
        shell: bash
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD_PRODUCTION }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF_PRODUCTION }}
    steps:
      - name: Checkout repository into Supabase folder
        uses: actions/checkout@v4
        with:
          path: supabase

      - name: Set up Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.84.2

      - name: Verify production secrets are configured
        run: |
          missing=0

          for secret_name in SUPABASE_ACCESS_TOKEN SUPABASE_DB_PASSWORD SUPABASE_PROJECT_REF; do
            if [[ -z "${!secret_name}" ]]; then
              echo "Missing required production secret: $secret_name"
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            exit 1
          fi

      - name: Confirm main branch deployment
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Automatic production deploys are only allowed from main."
            exit 1
          fi

      - name: Link repository to production project
        run: supabase link --workdir . --project-ref "$SUPABASE_PROJECT_REF" --password "$SUPABASE_DB_PASSWORD"

      - name: Show linked migration state
        run: supabase migration list --workdir . --linked

      - name: Push database migrations to production
        run: supabase db push --workdir . --linked
